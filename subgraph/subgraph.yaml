specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # ── PyrimidRegistry ──────────────────────────────────
  - kind: ethereum
    name: PyrimidRegistry
    network: base
    source:
      address: "0x34e22fc20D457095e2814CdFfad1e42980EEC389"
      abi: PyrimidRegistry
      startBlock: 43474113
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Affiliate
        - Vendor
        - ProtocolStats
        - AffiliateRegisteredEvent
        - VendorRegisteredEvent
      abis:
        - name: PyrimidRegistry
          file: ./abis/PyrimidRegistry.json
      eventHandlers:
        - event: AffiliateRegistered(indexed bytes16,indexed address,bytes16)
          handler: handleAffiliateRegistered
        - event: VendorRegistered(indexed bytes16,indexed address,string)
          handler: handleVendorRegistered
        - event: VendorUpdated(indexed bytes16)
          handler: handleVendorUpdated
        - event: ERC8004Linked(indexed bytes16,indexed uint256,indexed address)
          handler: handleERC8004Linked
      file: ./src/mapping.ts

  # ── PyrimidCatalog ───────────────────────────────────
  - kind: ethereum
    name: PyrimidCatalog
    network: base
    source:
      address: "0xC935d6B73034dDDb97AD2a1BbD2106F34A977908"
      abi: PyrimidCatalog
      startBlock: 43474113
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Product
        - Vendor
        - ProtocolStats
        - ProductListedEvent
      abis:
        - name: PyrimidCatalog
          file: ./abis/PyrimidCatalog.json
      eventHandlers:
        - event: ProductListed(indexed bytes16,indexed uint256,uint256,uint16,string)
          handler: handleProductListed
        - event: ProductUpdated(indexed bytes16,indexed uint256)
          handler: handleProductUpdated
        - event: ProductDeactivated(indexed bytes16,indexed uint256)
          handler: handleProductDeactivated
      file: ./src/mapping.ts

  # ── PyrimidRouter ────────────────────────────────────
  - kind: ethereum
    name: PyrimidRouter
    network: base
    source:
      address: "0xc949AEa380D7b7984806143ddbfE519B03ABd68B"
      abi: PyrimidRouter
      startBlock: 43474113
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - PaymentRoutedEvent
        - Affiliate
        - Vendor
        - Product
        - ProtocolStats
      abis:
        - name: PyrimidRouter
          file: ./abis/PyrimidRouter.json
      eventHandlers:
        - event: PaymentRouted(indexed bytes16,indexed uint256,indexed bytes16,address,uint256,uint256,uint256,uint256)
          handler: handlePaymentRouted
      file: ./src/mapping.ts

  # ── PyrimidTreasury ──────────────────────────────────
  - kind: ethereum
    name: PyrimidTreasury
    network: base
    source:
      address: "0x74A512F4f3F64aD479dEc4554a12855Ce943E12C"
      abi: PyrimidTreasury
      startBlock: 43474113
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AllocationEvent
        - ProtocolStats
      abis:
        - name: PyrimidTreasury
          file: ./abis/PyrimidTreasury.json
      eventHandlers:
        - event: Allocation(indexed address,uint256,string)
          handler: handleAllocation
      file: ./src/mapping.ts
