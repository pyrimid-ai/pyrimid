specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # ── PyrimidRegistry ──────────────────────────────────
  - kind: ethereum
    name: PyrimidRegistry
    network: base
    source:
      address: "0x2263852363Bce16791A059c6F6fBb590f0b98c89"
      abi: PyrimidRegistry
      startBlock: 43437586
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Affiliate
        - Vendor
        - ProtocolStats
        - AffiliateRegisteredEvent
        - VendorRegisteredEvent
      abis:
        - name: PyrimidRegistry
          file: ./abis/PyrimidRegistry.json
      eventHandlers:
        - event: AffiliateRegistered(indexed bytes16,indexed address,bytes16)
          handler: handleAffiliateRegistered
        - event: VendorRegistered(indexed bytes16,indexed address,string)
          handler: handleVendorRegistered
        - event: VendorUpdated(indexed bytes16)
          handler: handleVendorUpdated
        - event: ERC8004Linked(indexed bytes16,indexed uint256,indexed address)
          handler: handleERC8004Linked
      file: ./src/mapping.ts

  # ── PyrimidCatalog ───────────────────────────────────
  - kind: ethereum
    name: PyrimidCatalog
    network: base
    source:
      address: "0x1ae8EbbFf7c5A15a155c9bcF9fF7984e7C8e0E74"
      abi: PyrimidCatalog
      startBlock: 43437593
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Product
        - Vendor
        - ProtocolStats
        - ProductListedEvent
      abis:
        - name: PyrimidCatalog
          file: ./abis/PyrimidCatalog.json
      eventHandlers:
        - event: ProductListed(indexed bytes16,indexed uint256,uint256,uint16,string)
          handler: handleProductListed
        - event: ProductUpdated(indexed bytes16,indexed uint256)
          handler: handleProductUpdated
        - event: ProductDeactivated(indexed bytes16,indexed uint256)
          handler: handleProductDeactivated
      file: ./src/mapping.ts

  # ── PyrimidRouter ────────────────────────────────────
  - kind: ethereum
    name: PyrimidRouter
    network: base
    source:
      address: "0x6594A6B2785b1f8505b291bDc50E017b5599aFC8"
      abi: PyrimidRouter
      startBlock: 43437600
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - PaymentRoutedEvent
        - Affiliate
        - Vendor
        - Product
        - ProtocolStats
      abis:
        - name: PyrimidRouter
          file: ./abis/PyrimidRouter.json
      eventHandlers:
        - event: PaymentRouted(indexed bytes16,indexed uint256,indexed bytes16,address,uint256,uint256,uint256,uint256)
          handler: handlePaymentRouted
      file: ./src/mapping.ts

  # ── PyrimidTreasury ──────────────────────────────────
  - kind: ethereum
    name: PyrimidTreasury
    network: base
    source:
      address: "0xdF29F94EA8053cC0cb1567D0A8Ac8dd3d1E00908"
      abi: PyrimidTreasury
      startBlock: 43437579
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AllocationEvent
        - ProtocolStats
      abis:
        - name: PyrimidTreasury
          file: ./abis/PyrimidTreasury.json
      eventHandlers:
        - event: Allocation(indexed address,uint256,string)
          handler: handleAllocation
      file: ./src/mapping.ts
